version: "3.8"

services:
  fact-checker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    volumes:
      - audio-temp:/tmp/fact-checker-audio
    restart: unless-stopped

volumes:
  audio-temp:
